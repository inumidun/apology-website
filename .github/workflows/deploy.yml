name: Deploy to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: terraform init

      - name: Check and Import Existing Resources
        continue-on-error: true
        run: |
          echo "Checking for existing resources..."
          
          # Import S3 bucket if it exists
          if aws s3 ls "s3://${{ env.BUCKET_NAME }}" 2>/dev/null; then
            echo "Bucket exists, importing..."
            terraform import -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}" aws_s3_bucket.website ${{ env.BUCKET_NAME }} || true
            terraform import -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}" aws_s3_bucket_website_configuration.website ${{ env.BUCKET_NAME }} || true
            terraform import -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}" aws_s3_bucket_public_access_block.website ${{ env.BUCKET_NAME }} || true
            terraform import -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}" aws_s3_bucket_policy.website ${{ env.BUCKET_NAME }} || true
          fi
          
          # Import CloudFront OAC if it exists
          OAC_ID=$(aws cloudfront list-origin-access-controls --query "OriginAccessControlList.Items[?Name=='${{ env.BUCKET_NAME }}-oac'].Id" --output text 2>/dev/null || true)
          if [ ! -z "$OAC_ID" ]; then
            echo "CloudFront OAC exists, importing..."
            terraform import -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}" aws_cloudfront_origin_access_control.website "$OAC_ID" || true
          fi
          
          # Import CloudFront distribution if it exists
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='Apology website for Buslat'].Id" --output text 2>/dev/null || true)
          if [ ! -z "$DIST_ID" ]; then
            echo "CloudFront distribution exists, importing..."
            terraform import -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}" aws_cloudfront_distribution.website "$DIST_ID" || true
          fi

      - name: Terraform Plan
        run: terraform plan -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="bucket_name=${{ env.BUCKET_NAME }}" -var="aws_region=${{ env.AWS_REGION }}"

      - name: Get Website URL
        id: url
        run: |
          HTTPS_URL=$(terraform output -raw website_url)
          echo "website_url=$HTTPS_URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Share this URL with Buslat:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$HTTPS_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Works on all phones and browsers" >> $GITHUB_STEP_SUMMARY
          echo "✅ Secure HTTPS connection" >> $GITHUB_STEP_SUMMARY
          echo "✅ Free SSL certificate included" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ First deployment takes 10-15 minutes for CloudFront setup" >> $GITHUB_STEP_SUMMARY

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ env.BUCKET_NAME }}/ \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.tf" \
            --exclude "*.tfvars*" \
            --exclude ".terraform/*" \
            --exclude "*.tfstate*" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --cache-control "public, max-age=3600"
